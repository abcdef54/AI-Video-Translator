<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="nebula"></div> <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>

    <div class="glass-panel top-bar">
        <div class="source-tabs">
            <button class="tab-btn active" onclick="switchMode('url')">YouTube URL</button>
            <button class="tab-btn" onclick="switchMode('file')">Local File</button>
        </div>

        <div id="url-section" class="input-group active">
            <input type="text" id="video-url" placeholder="Paste YouTube URL here...">
            <button id="url-submit-button" class="ai-button">INITIALIZE VIDEO</button>
        </div>

        <div id="file-section" class="input-group hidden">
            <div id="drop-area" class="drop-zone">
                <div class="drop-content">
                    <span class="upload-icon">☁️</span>
                    <p>Drag & drop video here or <span class="browse-text">Browse</span></p>
                </div>
                <input type="file" id="file-input" accept="video/*,audio/*" hidden>
            </div>
            
            <div id="file-status" class="file-status hidden">
                <span id="file-name">video.mp4</span>
                <button id="remove-file-btn">✕</button>
            </div>

            <button id="file-submit-button" class="ai-button" disabled>UPLOAD & PLAY</button>
        </div>
    </div>

    <div id="middle-container">
        
        <div class="video-wrapper">
            <div id="player"></div> 
            <div id="subtitle-overlay">
                <span id="subtitle-text">Waiting for input...</span>
            </div>
            <button id="fullscreen-btn">⛶</button>
        </div>

        <div class="glass-panel side-panel">
    <h3>AI Configuration</h3>
    
    <div class="model-selector-container">
        <label for="model-select" style="font-size: 10px; color:#aaa; margin-bottom: 5px; display:block;">WHISPER MODEL SIZE</label>
        <select id="model-select" class="ai-select">
            <option value="tiny">Tiny (Fastest)</option>
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large-v3" selected>Large-v3</option>
        </select>
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;">

    <h3>Target Language</h3>

    <div class="scroll-wrapper">
        <div id="scroll-up" class="scroll-arrow hidden">▲</div> <div class="button-list" id="language-list">
            <button class="language-button active" value="zh">🇨🇳 Chinese</button>
            <button class="language-button" value="es">🇪🇸 Spanish</button>
            <button class="language-button" value="fr">🇫🇷 French</button>
            <button class="language-button" value="de">🇩🇪 German</button>
            <button class="language-button" value="ja">🇯🇵 Japanese</button>
            <button class="language-button" value="ru">🇷🇺 Russian</button>
            <button class="language-button" value="vi">🇻🇳 Vietnamese</button>
            <button class="language-button" value="it">🇮🇹 Italian</button>
            <button class="language-button" value="pt">🇵🇹 Portuguese</button>
            <button class="language-button" value="ko">🇰🇷 Korean</button>
        </div>

        <div id="scroll-down" class="scroll-arrow">▼</div> </div>
    </div>

    </div>
    
    <div class="glass-panel bottom-bar">
        <input type="text" id="context-input" placeholder="Inject Semantic Context (e.g. 'Coding Tutorial')">
        <button id="context-set-button" class="ai-button secondary">UPDATE CONTEXT</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="newjs.js"></script>
</body>
</html>
